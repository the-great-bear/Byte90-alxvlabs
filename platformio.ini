; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
test_ignore = *
build_flags =
	-DCORE_DEBUG_LEVEL=1
	-DBOARD_NAME=\"BYTE-90\"
	-DFIRMWARE_VERSION=\"3.0.0\"

	-DMQTT_MAX_PACKET_SIZE=2048
	-DMBEDTLS_SSL_IN_CONTENT_LEN=4096
	-DMBEDTLS_SSL_OUT_CONTENT_LEN=4096
	-DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
	-DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096

	-DCONFIG_SPIRAM_USE_MALLOC=1
	-DCONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC=1
	-DCONFIG_MBEDTLS_DYNAMIC_BUFFER=1
	-DCONFIG_MBEDTLS_DYNAMIC_FREE_PEER_CERT=1
	-DCONFIG_MBEDTLS_DYNAMIC_FREE_CONFIG_DATA=1

	-DCONFIG_MBEDTLS_SSL_SESSION_TICKETS=1
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
lib_ldf_mode = deep+
lib_deps = 
	lewisxhe/XPowersLib@^0.3.1
	bblanchon/ArduinoJson@^7.4.2
	sh123/esp32_opus@^1.0.3
	adafruit/Adafruit GFX Library@^1.11.11
	adafruit/Adafruit SSD1351 library@^1.3.2
	adafruit/Adafruit DRV2605 Library@^1.2.4
	adafruit/Adafruit ADXL345@^1.3.4
	adafruit/RTClib@^2.1.4
	bitbank2/AnimatedGIF@^2.2.0
	arduino-libraries/ArduinoMqttClient@^0.1.8

[env:seeed_xiao_esp32s3_test]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags =
	${env:seeed_xiao_esp32s3.build_flags}
	-DUNITY_DOUBLE_PRECISION=1e-12
	-DTEST_ENV
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
test_framework = unity
test_build_src = yes
lib_ldf_mode = deep+
build_src_filter =
	+<*>
	-<main.cpp>
lib_deps =
	lewisxhe/XPowersLib@^0.3.1
	bblanchon/ArduinoJson@^7.4.2
	sh123/esp32_opus@^1.0.3
	adafruit/Adafruit GFX Library@^1.11.11
	adafruit/Adafruit SSD1351 library@^1.3.2
	adafruit/Adafruit DRV2605 Library@^1.2.4
	adafruit/Adafruit ADXL345@^1.3.4
	adafruit/RTClib@^2.1.4
	bitbank2/AnimatedGIF@^2.2.0
	arduino-libraries/ArduinoMqttClient@^0.1.8
